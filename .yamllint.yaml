# Configuration for https://github.com/adrienverge/yamllint

extends: default

# Specify files to ignore.
ignore:
  # Ignore autogenerated file that does not conform to yamllint rules.
  - .copier-answers.yml
  # Ignore schema files that may not conform due to imports.
  - docs/schema/*.yaml

rules:
  document-start: disable  # Don't check if document has a start marker (---).
  line-length:
    max: 88
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  new-lines: disable  # Don't check for type of new line characters.
