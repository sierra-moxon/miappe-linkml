name: miappe-linkml
description: A LinkML representation of the MIAPPE (Minimum Information About a Plant
  Phenotyping Experiment) v1.1 checklist and data model. The structure follows the
  MIAPPE entity relationship diagram (Investigation > Study > Observation Unit > Sample)
  together with the supporting entities (Person, Publication, Biological Material,
  Environment Parameter, Experimental Factor, Event, Data File and Observed Variable).
  Each slot records its MIAPPE "codename" in a comment, and enumerations are derived
  from the MIAPPE checklist and its appendices.
title: MIAPPE LinkML
see_also:
- https://github.com/MIAPPE/MIAPPE
- https://www.miappe.org/
id: https://w3id.org/sierra-moxon/miappe-linkml
imports:
- linkml:types
license: Apache-2.0
prefixes:
  miappe_linkml:
    prefix_prefix: miappe_linkml
    prefix_reference: https://w3id.org/sierra-moxon/miappe-linkml/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  PO:
    prefix_prefix: PO
    prefix_reference: http://purl.obolibrary.org/obo/PO_
  TO:
    prefix_prefix: TO
    prefix_reference: http://purl.obolibrary.org/obo/TO_
  NCBITaxon:
    prefix_prefix: NCBITaxon
    prefix_reference: http://purl.obolibrary.org/obo/NCBITaxon_
  EO:
    prefix_prefix: EO
    prefix_reference: http://purl.obolibrary.org/obo/EO_
  CO_715:
    prefix_prefix: CO_715
    prefix_reference: http://www.cropontology.org/rdf/CO_715_
  CO_322:
    prefix_prefix: CO_322
    prefix_reference: http://www.cropontology.org/rdf/CO_322_
  XEO:
    prefix_prefix: XEO
    prefix_reference: http://purl.obolibrary.org/obo/XEO_
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
default_prefix: miappe_linkml
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  LicenseEnum:
    name: LicenseEnum
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/LicenseEnum
    description: License for the reuse of the data associated with an investigation.
      The Creative Commons licenses are recommended.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    permissible_values:
      cc_by_4_0:
        text: cc_by_4_0
        description: Creative Commons Attribution 4.0 International.
      cc_by_sa_4_0:
        text: cc_by_sa_4_0
        description: Creative Commons Attribution-ShareAlike 4.0 International.
      cc_by_nc_4_0:
        text: cc_by_nc_4_0
        description: Creative Commons Attribution-NonCommercial 4.0 International.
      cc_by_nd_4_0:
        text: cc_by_nd_4_0
        description: Creative Commons Attribution-NoDerivatives 4.0 International.
      cc0_1_0:
        text: cc0_1_0
        description: Creative Commons Public Domain Dedication.
      unreported:
        text: unreported
        description: The license was not reported.
  ObservationUnitTypeEnum:
    name: ObservationUnitTypeEnum
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/ObservationUnitTypeEnum
    description: Type of observation unit. Use of other observation unit types is
      possible but not recommended.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    permissible_values:
      study:
        text: study
        description: The whole study as an observation unit.
      block:
        text: block
        description: A block in the experimental design.
      sub_block:
        text: sub_block
        description: A sub-block in the experimental design.
      plot:
        text: plot
        description: A plot in the experimental design.
      sub_plot:
        text: sub_plot
        description: A sub-plot in the experimental design.
      pot:
        text: pot
        description: A pot containing one or more plants.
      plant:
        text: plant
        description: An individual plant.
  ExperimentalFactorTypeEnum:
    name: ExperimentalFactorTypeEnum
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/ExperimentalFactorTypeEnum
    description: Non-exhaustive list of experimental factor types, from MIAPPE Appendix
      II. Most map to the Plant Environment Ontology (EO).
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    permissible_values:
      seasonal_environment:
        text: seasonal_environment
        description: A plant treatment involving an exposure to given conditions of
          regional seasons.
        meaning: EO:0007038
      air_treatment_regime:
        text: air_treatment_regime
        description: Exposure to wind/air with varying degree of temperature.
        meaning: EO:0007161
      soil_temperature_regime:
        text: soil_temperature_regime
        description: Exposure to varying degree of soil temperature.
        meaning: EO:0007161
      soil_treatment_regime:
        text: soil_treatment_regime
        description: Growing plants and exposing them to soil growth media with varying
          contents.
        meaning: EO:0007161
      antibiotic_regime:
        text: antibiotic_regime
        description: A chemical treatment involving the use of antibiotics.
        meaning: EO:0007041
      chemical_administration:
        text: chemical_administration
        description: An abiotic plant treatment involving the application of chemicals.
        meaning: EO:0007189
      biotic_treatment:
        text: biotic_treatment
        description: Application of a biotic factor such as a microbe, insect, animal
          or plant.
        meaning: EO:0007357
      fertilizer_regime:
        text: fertilizer_regime
        description: A plant nutrient treatment involving the use of a fertilizer.
        meaning: EO:0007085
      fungicide_regime:
        text: fungicide_regime
        description: Application of a fungicide.
        meaning: EO:0007268
      gaseous_regime:
        text: gaseous_regime
        description: Application of a gas or a combination of gasses.
        meaning: EO:0007023
      gravity:
        text: gravity
        description: Use of gravity to study responses in presence, absence or modified
          levels of gravity.
        meaning: EO:0007146
      plant_hormone_regime:
        text: plant_hormone_regime
        description: Use of growth hormones.
        meaning: EO:0007165
      herbicide_regime:
        text: herbicide_regime
        description: Application of a herbicide.
        meaning: EO:0007183
      mechanical_treatment:
        text: mechanical_treatment
        description: Application of a mechanical force.
        meaning: EO:0007373
      chemical_regime:
        text: chemical_regime
        description: Application of inorganic chemicals, nutriment or organic chemicals
          as a supplement.
        meaning: EO:0007044
      humidity_regimen:
        text: humidity_regimen
        description: Exposure to varying degree of humidity.
        meaning: EO:0007359
      radiation_regime:
        text: radiation_regime
        description: Exposure to a radiation type, intensity or quantity (light, UV-B,
          X-ray).
        meaning: EO:0007151
      rainfall_regime:
        text: rainfall_regime
        description: Exposure to a given amount of rainfall.
        meaning: EO:0007181
      salt_regime:
        text: salt_regime
        description: Use of salts as a supplement to growth media.
        meaning: EO:0007185
      watering_regime:
        text: watering_regime
        description: Exposure to watering frequencies.
        meaning: EO:0007383
      water_temperature_regime:
        text: water_temperature_regime
        description: Exposure to water with varying degree of temperature.
        meaning: EO:0007160
      standing_water_regime:
        text: standing_water_regime
        description: Exposure to standing water during a plant's life span.
        meaning: EO:0007282
      pesticide_regime:
        text: pesticide_regime
        description: Application of a pesticide.
        meaning: EO:0007167
      ph_regime:
        text: ph_regime
        description: Exposure to varying levels of pH of the growth media.
        meaning: EO:0007171
      other_perturbation:
        text: other_perturbation
        description: Any other perturbation not covered by the listed factor types.
slots:
  investigation_id:
    name: investigation_id
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/investigation_id
    description: Identifier comprising the unique name of the institution/database
      hosting the submission of the investigation data, and the accession number of
      the investigation in that institution.
    comments:
    - 'MIAPPE codename: investigationId'
    examples:
    - value: EBI:12345678
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: Investigation
    domain_of:
    - Investigation
    range: uriorcurie
    required: true
  investigation_title:
    name: investigation_title
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/investigation_title
    description: Human-readable string summarising the investigation.
    comments:
    - 'MIAPPE codename: investigationTitle'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - dcterms:title
    slot_uri: dcterms:title
    owner: Investigation
    domain_of:
    - Investigation
    range: string
    required: true
  investigation_description:
    name: investigation_description
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/investigation_description
    description: Human-readable text describing the investigation in more detail.
    comments:
    - 'MIAPPE codename: investigationDescription'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - dcterms:description
    slot_uri: dcterms:description
    owner: Investigation
    domain_of:
    - Investigation
    range: string
  submission_date:
    name: submission_date
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/submission_date
    description: Date of submission of the dataset presently being described to a
      host repository (ISO 8601, optional time zone).
    comments:
    - 'MIAPPE codename: submissionDate'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:submission_date
    owner: Investigation
    domain_of:
    - Investigation
    range: date_or_datetime
  public_release_date:
    name: public_release_date
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/public_release_date
    description: Date of first public release of the dataset presently being described
      (ISO 8601, optional time zone).
    comments:
    - 'MIAPPE codename: publicReleaseDate'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:public_release_date
    owner: Investigation
    domain_of:
    - Investigation
    range: date_or_datetime
  license:
    name: license
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/license
    description: License for the reuse of the data associated with this investigation.
      The Creative Commons licenses cover most use cases and are recommended.
    comments:
    - 'MIAPPE codename: license'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:license
    owner: Investigation
    domain_of:
    - Investigation
    range: LicenseEnum
  miappe_version:
    name: miappe_version
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/miappe_version
    description: The version of MIAPPE used.
    comments:
    - 'MIAPPE codename: miappeVersion'
    examples:
    - value: '1.1'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:miappe_version
    owner: Investigation
    domain_of:
    - Investigation
    range: string
    required: true
  associated_publications:
    name: associated_publications
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/associated_publications
    description: Publications where the investigation is described. Use of DOIs is
      recommended.
    comments:
    - 'MIAPPE codename: associatedPublication'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:associated_publications
    owner: Investigation
    domain_of:
    - Investigation
    range: Publication
    multivalued: true
    inlined: true
    inlined_as_list: true
  associated_publication:
    name: associated_publication
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/associated_publication
    description: An identifier for a literature publication where the investigation
      is described. Use of DOIs is recommended.
    comments:
    - 'MIAPPE codename: associatedPublication'
    examples:
    - value: doi:10.1371/journal.pone.0071377
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:associated_publication
    owner: Publication
    domain_of:
    - Publication
    range: uriorcurie
  study_id:
    name: study_id
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/study_id
    description: Unique identifier comprising the name or identifier for the institution/database
      hosting the submission of the study data, and the identifier of the study in
      that institution.
    comments:
    - 'MIAPPE codename: studyId'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: Study
    domain_of:
    - Study
    range: uriorcurie
    required: true
  study_title:
    name: study_title
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/study_title
    description: Name, human-readable text summarising the study.
    comments:
    - 'MIAPPE codename: studyTitle'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - dcterms:title
    slot_uri: dcterms:title
    owner: Study
    domain_of:
    - Study
    range: string
    required: true
  study_description:
    name: study_description
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/study_description
    description: Human-readable text describing the study.
    comments:
    - 'MIAPPE codename: studyDescription'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mappings:
    - dcterms:description
    slot_uri: dcterms:description
    owner: Study
    domain_of:
    - Study
    range: string
  study_start_date:
    name: study_start_date
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/study_start_date
    description: Date and, if relevant, time when the experiment started.
    comments:
    - 'MIAPPE codename: studyStartDate'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slot_uri: miappe_linkml:study_start_date
    owner: Study
    domain_of:
    - Study
    range: date_or_datetime
    required: true
  study_end_date:
    name: study_end_date
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/study_end_date
    description: Date and, if relevant, time when the experiment ended.
    comments:
