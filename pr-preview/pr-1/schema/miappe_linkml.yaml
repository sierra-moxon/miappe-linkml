classes:
  Investigation:
    name: Investigation
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Investigation
    description: Investigations are research programmes with defined aims. They can
      exist at various scales (for example, they could encompass a grant-funded programme
      of work, the various components comprising a peer-reviewed publication, or a
      single experiment). One investigation is expected per MIAPPE submission.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - investigation_id
    - investigation_title
    - investigation_description
    - submission_date
    - public_release_date
    - license
    - miappe_version
    - associated_publications
    - persons
    - studies
    class_uri: miappe_linkml:Investigation
    tree_root: true
  Study:
    name: Study
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Study
    description: A study (or experiment) comprises a series of assays (or measurements)
      of one or more types, undertaken to answer a particular biological question.
      At least one study is expected per investigation.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - study_id
    - study_title
    - study_description
    - study_start_date
    - study_end_date
    - contact_institution
    - location_country
    - site_name
    - location_latitude
    - location_longitude
    - location_altitude
    - experimental_design_description
    - experimental_design_type
    - observation_unit_level_hierarchy
    - observation_unit_description
    - growth_facility_description
    - growth_facility_type
    - cultural_practices
    - experimental_design_map
    - persons
    - data_files
    - biological_materials
    - environment_parameters
    - experimental_factors
    - events
    - observation_units
    - observed_variables
    class_uri: miappe_linkml:Study
  Person:
    name: Person
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Person
    description: A human involved in the investigation or specifically any of its
      studies. At least one person is expected per investigation.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - person_name
    - person_email
    - person_id
    - person_roles
    - person_affiliations
    class_uri: miappe_linkml:Person
  Publication:
    name: Publication
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Publication
    description: A literature publication where the investigation is described. Use
      of DOIs is recommended.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - associated_publication
    class_uri: miappe_linkml:Publication
  DataFile:
    name: DataFile
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/DataFile
    description: A file or digital object holding observation data recorded during
      one or more assays of the study, typically in tabular form.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - data_file_link
    - data_file_description
    - data_file_version
    class_uri: miappe_linkml:DataFile
  BiologicalMaterial:
    name: BiologicalMaterial
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/BiologicalMaterial
    description: The biological material being studied (e.g. plants grown from a certain
      bag or seed, or plants grown in a particular field). The original source of
      that material is called the material source.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mixins:
    - GeoReferenced
    slots:
    - biological_material_id
    - biological_material_external_ids
    - organism
    - genus
    - species
    - infraspecific_name
    - biological_material_preprocessing
    - material_source
    - latitude
    - longitude
    - altitude
    - coordinates_uncertainty
    class_uri: miappe_linkml:BiologicalMaterial
  MaterialSource:
    name: MaterialSource
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/MaterialSource
    description: An identifier for the source of the biological material (commonly
      called germplasm, accession, genotype or variety), together with any repository
      accession information and provenance.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mixins:
    - GeoReferenced
    slots:
    - material_source_id
    - material_source_doi
    - material_source_accession_number
    - material_source_accession_name
    - material_source_institute_code
    - material_source_institute_name
    - material_source_other_ids
    - material_source_description
    - latitude
    - longitude
    - altitude
    - coordinates_uncertainty
    class_uri: miappe_linkml:MaterialSource
  EnvironmentParameter:
    name: EnvironmentParameter
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/EnvironmentParameter
    description: An environmental parameter that was kept constant throughout the
      study and did not change between observation units or assays.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - environment_parameter_name
    - environment_parameter_value
    class_uri: miappe_linkml:EnvironmentParameter
  ExperimentalFactor:
    name: ExperimentalFactor
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/ExperimentalFactor
    description: A condition that varies between observation units, which may be biotic
      (pest, disease interaction) or abiotic (treatment and cultural practice) in
      nature. The object of a study is to ascertain the impact of one or more factors
      on the biological material.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - experimental_factor_type
    - experimental_factor_description
    - experimental_factor_values
    class_uri: miappe_linkml:ExperimentalFactor
  Event:
    name: Event
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Event
    description: An event is a discrete occurrence at a particular time in the experiment
      (which can be natural, such as rain, or unnatural, such as planting, watering,
      etc).
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - event_type
    - event_accession_number
    - event_description
    - event_dates
    class_uri: miappe_linkml:Event
  ObservationUnit:
    name: ObservationUnit
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/ObservationUnit
    description: 'Observation units are objects that are subject to instances of observation
      and measurement. An observation unit comprises one or more plants, and/or their
      environment. (Synonym: Experimental unit)'
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - observation_unit_id
    - observation_unit_type
    - observation_unit_external_ids
    - spatial_distribution
    - observation_unit_factor_values
    - biological_material
    - samples
    class_uri: miappe_linkml:ObservationUnit
  Sample:
    name: Sample
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Sample
    description: A sample is a portion of plant tissue harvested, non-harvested or
      extracted from an observation unit for the purpose of sub-plant observations
      and/or molecular studies.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - sample_id
    - development_stage
    - anatomical_entity
    - sample_description
    - collection_date
    - sample_external_ids
    class_uri: miappe_linkml:Sample
  ObservedVariable:
    name: ObservedVariable
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/ObservedVariable
    description: An observed variable describes how a measurement has been made. It
      typically takes the form of a measured characteristic of the observation unit
      (plant or environmental trait), associated to the method and unit of measurement.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - variable_id
    - variable_name
    - variable_accession_number
    - trait
    - method
    - scale
    class_uri: miappe_linkml:ObservedVariable
  Trait:
    name: Trait
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Trait
    description: The (plant or environmental) trait under observation, optionally
      described by the entity it is measured on and its characteristic.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - trait_name
    - trait_entity
    - trait_entity_accession_number
    - trait_characteristic
    - trait_characteristic_accession_number
    - trait_accession_number
    class_uri: miappe_linkml:Trait
  Method:
    name: Method
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Method
    description: The method of observation used to record an observed variable.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - method_name
    - method_accession_number
    - method_description
    - method_reference
    class_uri: miappe_linkml:Method
  Scale:
    name: Scale
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/Scale
    description: The scale (unit of measurement) associated with an observed variable.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    slots:
    - scale_name
    - scale_accession_number
    - time_scale
    class_uri: miappe_linkml:Scale
  GeoReferenced:
    name: GeoReferenced
    definition_uri: https://w3id.org/sierra-moxon/miappe-linkml/GeoReferenced
    description: A mixin providing decimal geographic coordinates (latitude, longitude,
      altitude) plus a circular coordinate uncertainty, as used for in situ biological
      material and material sources in MIAPPE.
    from_schema: https://w3id.org/sierra-moxon/miappe-linkml
    mixin: true
    slots:
    - latitude
    - longitude
    - altitude
    - coordinates_uncertainty
    class_uri: miappe_linkml:GeoReferenced
